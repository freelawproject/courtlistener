<c-vars header class=""></c-vars>

{% with base_class="align-middle text-sm font-normal px-2.5 py-4" %}
{% if header %}
<th scope="row" class="{{ base_class }} {{ class }}" {{ attrs }}>
  {{ slot }}
</th>
{% else %}
<td class="{{ base_class }} {{ class }}" {{ attrs }}>
  {{ slot }}
</td>
{% endif %}
{% endwith %}
