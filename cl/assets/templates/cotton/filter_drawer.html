{% load component_tags svg_tags %}

<c-vars
  title="Filters"
  has_errors=""
  class=""
/>
<c-dialog
  variant="drawer"
  class="md:hidden {{ class }}"
  x-on:open-filter-drawer="open"
  :attrs="{% if has_errors %}{'data-has-errors': True}{% else %}{}{% endif %}"
>
  <c-slot name="trigger_button">
    <c-button
      variant="outline"
      x-on:click="open"
      x-bind:aria-controls="dialogId"
      x-bind:aria-expanded="isOpen"
      aria-haspopup="dialog"
    >
    {% svg "funnel" class="w-4 h-4" aria_hidden="true" %}
    {{ title }}
    </c-button>
  </c-slot>
  <c-slot name="panel">

    {# Header #}
    <div class="flex items-center justify-between px-4 py-3 border-b border-greyscale-200">
      <h2 x-dialog:title class="text-lg font-semibold text-greyscale-900">{{ title }}</h2>
      <c-button
        variant="ghost"
        x-on:click="close"
        class="p-1"
        aria-label="Close filters"
      >
        {% svg "cross" class="w-5 h-5" aria_hidden="true" %}
      </c-button>
    </div>

    {# Content — filter fields projected via slot #}
    <div class="flex-1 overflow-y-auto px-4 py-4">
      {{ slot }}
    </div>

    {# Footer with Apply button #}
    <div class="px-4 py-3 border-t border-greyscale-200">
      {{ footer }}
    </div>
  </c-slot>
</c-dialog>
